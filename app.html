<!DOCTYPE html>
<html lang="ja" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="google" content="notranslate">
<meta http-equiv="Content-Language" content="ja">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KY活動表">
<meta name="theme-color" content="#0f3460">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>KY活動表 — 危険予知</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --navy: #0f3460;
    --navy-light: #16213e;
    --blue: #1a56db;
    --blue-mid: #3b82f6;
    --blue-light: #dbeafe;
    --accent: #f59e0b;
    --accent-light: #fef3c7;
    --danger: #ef4444;
    --warn: #f97316;
    --safe: #10b981;
    --bg: #f0f4f8;
    --card: #ffffff;
    --text: #0f172a;
    --muted: #64748b;
    --border: #e2e8f0;
    --radius: 16px;
    --shadow: 0 2px 16px rgba(15,52,96,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #app {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    position: relative;
  }

  /* ─── HEADER ─── */
  .header {
    background: linear-gradient(160deg, var(--navy) 0%, #1a3a6e 100%);
    padding: 20px 20px 0;
    color: white;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -40px; right: -30px;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -20px; left: 30px;
    width: 80px; height: 80px;
    border-radius: 50%;
    background: rgba(245,158,11,0.10);
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
    position: relative;
  }
  .header-icon {
    font-size: 32px;
    line-height: 1;
  }
  .header-title {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.5px;
  }
  .header-sub {
    font-size: 11px;
    opacity: 0.65;
    margin-top: 2px;
    font-weight: 400;
  }
  .offline-badge {
    margin-left: auto;
    background: rgba(16,185,129,0.2);
    border: 1px solid rgba(16,185,129,0.4);
    color: #6ee7b7;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 700;
  }
  .offline-badge.offline {
    background: rgba(239,68,68,0.2);
    border-color: rgba(239,68,68,0.4);
    color: #fca5a5;
  }

  /* ─── PROGRESS ─── */
  .progress-wrap {
    position: relative;
    padding: 0 0 20px;
  }
  .progress-track {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
  }
  .progress-seg {
    flex: 1;
    height: 3px;
    border-radius: 2px;
    background: rgba(255,255,255,0.15);
    transition: background 0.4s;
  }
  .progress-seg.done { background: var(--accent); }
  .progress-seg.active { background: rgba(255,255,255,0.7); }
  .progress-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .step-name {
    font-size: 12px;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
    font-family: 'M PLUS Rounded 1c', sans-serif;
  }
  .step-count {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
  }

  /* ─── CONTENT ─── */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px 100px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    -webkit-overflow-scrolling: touch;
  }

  /* ─── CARDS ─── */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--shadow);
    animation: fadeSlide 0.3s ease;
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card-accent { border-left: 4px solid var(--blue); }
  .card-warn { border-left: 4px solid var(--warn); }
  .card-danger { border-left: 4px solid var(--danger); }
  .card-safe { border-left: 4px solid var(--safe); }

  .card-title {
    font-size: 11px;
    font-weight: 800;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-title span { font-size: 16px; }

  /* ─── FORM ELEMENTS ─── */
  label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  input[type=text], input[type=date], input[type=number], textarea, select {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--text);
    background: #f8fafc;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }
  input:focus, textarea:focus, select:focus {
    border-color: var(--blue-mid);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    background: #fff;
  }
  textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  .row2 { display: grid; grid-template-columns: 1fr auto; gap: 10px; }

  /* ─── SCORE BUTTONS ─── */
  .score-group {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .score-btn {
    padding: 12px 4px;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: #f8fafc;
    cursor: pointer;
    text-align: center;
    transition: all 0.18s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .score-btn:active { transform: scale(0.95); }
  .score-btn .score-val {
    font-size: 20px;
    font-weight: 900;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    color: var(--muted);
  }
  .score-btn .score-lbl {
    font-size: 10px;
    color: var(--muted);
    font-weight: 600;
  }
  .score-btn.selected-low { border-color: var(--safe); background: #ecfdf5; }
  .score-btn.selected-low .score-val { color: var(--safe); }
  .score-btn.selected-mid { border-color: var(--warn); background: #fff7ed; }
  .score-btn.selected-mid .score-val { color: var(--warn); }
  .score-btn.selected-high { border-color: var(--danger); background: #fef2f2; }
  .score-btn.selected-high .score-val { color: var(--danger); }

  /* ─── RISK BADGE ─── */
  .risk-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 800;
  }
  .risk-low { background: #ecfdf5; color: var(--safe); }
  .risk-mid { background: #fff7ed; color: var(--warn); }
  .risk-high { background: #fef2f2; color: var(--danger); }

  /* ─── YES/NO BUTTONS ─── */
  .yn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .yn-btn {
    padding: 16px;
    border-radius: 14px;
    border: 2px solid var(--border);
    background: #f8fafc;
    cursor: pointer;
    font-size: 16px;
    font-weight: 800;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    transition: all 0.18s;
  }
  .yn-btn:active { transform: scale(0.96); }
  .yn-btn.yn-good { border-color: var(--safe); background: #ecfdf5; color: var(--safe); }
  .yn-btn.yn-bad { border-color: var(--danger); background: #fef2f2; color: var(--danger); }

  /* ─── HAZARD CARD ─── */
  .hazard-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--shadow);
    border-left: 4px solid var(--border);
    margin-bottom: 14px;
    animation: fadeSlide 0.3s ease;
    transition: border-color 0.3s;
  }
  .hazard-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .hazard-num {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-size: 13px;
    font-weight: 800;
    color: var(--navy);
  }
  .divider { height: 1px; background: var(--border); margin: 14px 0; }

  /* ─── INFO BOX ─── */
  .info-box {
    background: var(--blue-light);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 11px;
    color: var(--blue);
    line-height: 1.7;
    font-weight: 500;
  }
  .warn-box {
    background: #fff7ed;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 11px;
    color: var(--warn);
    line-height: 1.7;
    font-weight: 600;
    display: flex;
    gap: 6px;
    align-items: flex-start;
  }

  /* ─── SUMMARY ─── */
  .summary-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #f1f5f9;
    font-size: 13px;
    gap: 12px;
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-key {
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    min-width: 80px;
    text-transform: uppercase;
  }
  .summary-val { color: var(--text); flex: 1; text-align: right; word-break: break-all; }

  /* ─── PARTICIPANT ─── */
  .participant-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .participant-slot {
    position: relative;
  }
  .participant-slot input {
    padding-left: 32px;
  }
  .participant-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    pointer-events: none;
  }

  /* ─── SUCCESS SCREEN ─── */
  .success-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    text-align: center;
    gap: 16px;
    animation: fadeSlide 0.4s ease;
  }
  .success-icon {
    font-size: 72px;
    animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes pop {
    from { transform: scale(0.3); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .success-title {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-size: 24px;
    font-weight: 900;
    color: var(--navy);
  }
  .success-sub { font-size: 13px; color: var(--muted); line-height: 1.7; }

  /* ─── FOOTER ─── */
  .footer {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    display: flex;
    gap: 10px;
    z-index: 100;
  }

  /* ─── BUTTONS ─── */
  .btn {
    padding: 15px 0;
    border-radius: 14px;
    border: none;
    font-size: 14px;
    font-weight: 800;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    cursor: pointer;
    transition: all 0.18s;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn:active { transform: scale(0.97); }
  .btn-back {
    background: #f1f5f9;
    color: var(--muted);
    border: 1.5px solid var(--border);
    flex: 0.7;
  }
  .btn-next {
    background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
    color: white;
    box-shadow: 0 4px 16px rgba(26,86,219,0.35);
  }
  .btn-submit {
    background: linear-gradient(135deg, #065f46 0%, var(--safe) 100%);
    color: white;
    box-shadow: 0 4px 16px rgba(16,185,129,0.35);
  }
  .btn-download {
    background: linear-gradient(135deg, var(--navy) 0%, #2563eb 100%);
    color: white;
    box-shadow: 0 4px 16px rgba(15,52,96,0.35);
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    font-size: 15px;
    margin-top: 8px;
  }
  .btn-new {
    background: #f1f5f9;
    color: var(--navy);
    border: 1.5px solid var(--border);
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 800;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    cursor: pointer;
    margin-top: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.18s;
  }
  .btn-new:active { transform: scale(0.97); }

  /* ─── RECORDS LIST ─── */
  .records-panel {
    background: var(--card);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--shadow);
    animation: fadeSlide 0.3s ease;
  }
  .record-item {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
  }
  .record-item:last-child { border-bottom: none; padding-bottom: 0; }
  .record-date { font-size: 13px; font-weight: 700; color: var(--navy); }
  .record-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .record-arrow { color: var(--muted); font-size: 16px; }

  /* ─── TABS ─── */
  .tabs {
    display: flex;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 3px;
    margin: 0 0 6px;
    position: relative;
  }
  .tab {
    flex: 1;
    padding: 8px;
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s;
    font-family: 'M PLUS Rounded 1c', sans-serif;
  }
  .tab.active {
    background: rgba(255,255,255,0.15);
    color: white;
  }

  /* ─── FLOATING RECORD BUTTON ─── */
  .fab {
    position: fixed;
    bottom: 90px;
    right: calc(50% - 230px);
    background: white;
    border: none;
    border-radius: 50px;
    padding: 10px 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    font-size: 12px;
    font-weight: 700;
    color: var(--navy);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
    z-index: 50;
    font-family: 'M PLUS Rounded 1c', sans-serif;
  }
  .fab:active { transform: scale(0.95); }

  /* modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    display: flex; align-items: flex-end; justify-content: center;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--card);
    border-radius: 24px 24px 0 0;
    padding: 24px 20px 36px;
    width: 100%;
    max-width: 480px;
    max-height: 80vh;
    overflow-y: auto;
    animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-title {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-size: 18px;
    font-weight: 900;
    color: var(--navy);
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-close {
    background: #f1f5f9;
    border: none;
    border-radius: 50%;
    width: 32px; height: 32px;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
  }

  /* ─── AI CHAT ─── */
  .ai-wrap { display:flex; flex-direction:column; gap:12px; height:calc(100vh - 200px); }
  .ai-chat-header {
    background:var(--card); border-radius:var(--radius);
    padding:14px 16px; box-shadow:var(--shadow);
    display:flex; align-items:center; gap:10px;
  }
  .ai-chat-header-icon { font-size:28px; }
  .ai-chat-header-title { font-size:14px; font-weight:800; color:var(--navy); }
  .ai-chat-header-sub { font-size:11px; color:var(--muted); margin-top:2px; }

  .ai-chips { display:flex; flex-wrap:wrap; gap:6px; padding:4px 0; }
  .ai-chip {
    padding:5px 12px; border-radius:20px; font-size:11px; font-weight:700;
    border:1.5px solid var(--border); background:#f8fafc; color:var(--muted);
    cursor:pointer; transition:all .15s; font-family:'Noto Sans JP',sans-serif;
  }
  .ai-chip:hover { border-color:var(--blue-mid); color:var(--blue); background:var(--blue-light); }
  .ai-chip:active { transform:scale(.94); }

  .ai-messages {
    flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px;
    background:var(--card); border-radius:var(--radius); padding:14px;
    box-shadow:var(--shadow); min-height:200px; max-height:380px;
  }
  .ai-msg { display:flex; gap:8px; animation:fadeSlide .25s ease; }
  .ai-msg.user { flex-direction:row-reverse; }
  .ai-msg-avatar {
    width:30px; height:30px; border-radius:50%; display:flex;
    align-items:center; justify-content:center; font-size:14px;
    flex-shrink:0; margin-top:2px;
  }
  .ai-msg.bot .ai-msg-avatar  { background:linear-gradient(135deg,var(--navy),var(--blue)); }
  .ai-msg.user .ai-msg-avatar { background:linear-gradient(135deg,#065f46,var(--safe)); }
  .ai-msg-bubble {
    max-width:82%; padding:10px 13px; border-radius:16px;
    font-size:13px; line-height:1.65; color:var(--text);
  }
  .ai-msg.bot  .ai-msg-bubble { background:#f1f5f9; border-bottom-left-radius:4px; }
  .ai-msg.user .ai-msg-bubble {
    background:linear-gradient(135deg,var(--navy),var(--blue));
    color:#fff; border-bottom-right-radius:4px;
  }
  .ai-msg-bubble strong { color:var(--danger); }
  .ai-msg-bubble .safe  { color:var(--safe); font-weight:700; }
  .ai-msg-bubble .warn  { color:var(--warn); font-weight:700; }

  .ai-msg-bubble ul { margin:6px 0 0 14px; padding:0; }
  .ai-msg-bubble li { margin-bottom:4px; }

  .ai-typing {
    display:flex; gap:4px; align-items:center; padding:8px 4px;
  }
  .ai-typing span {
    width:7px; height:7px; border-radius:50%; background:var(--muted);
    animation:typingDot 1.2s ease infinite;
  }
  .ai-typing span:nth-child(2) { animation-delay:.2s; }
  .ai-typing span:nth-child(3) { animation-delay:.4s; }
  @keyframes typingDot {
    0%,60%,100% { opacity:.3; transform:scale(.8); }
    30% { opacity:1; transform:scale(1.1); }
  }

  .ai-fill-banner {
    background:linear-gradient(135deg,#ecfdf5,#d1fae5);
    border:1.5px solid #6ee7b7; border-radius:12px;
    padding:10px 14px; display:flex; align-items:center; gap:10px;
    cursor:pointer; transition:all .15s;
  }
  .ai-fill-banner:active { transform:scale(.98); }
  .ai-fill-banner-text { flex:1; font-size:12px; font-weight:700; color:#065f46; }
  .ai-fill-banner-btn {
    padding:7px 13px; border-radius:10px; border:none;
    background:#059669; color:#fff; font-size:12px; font-weight:700;
    cursor:pointer; font-family:'Noto Sans JP',sans-serif; white-space:nowrap;
  }

  .ai-input-row {
    display:flex; gap:8px; background:var(--card);
    border-radius:var(--radius); padding:10px; box-shadow:var(--shadow);
  }
  .ai-input-row input {
    flex:1; padding:10px 13px; border:1.5px solid var(--border);
    border-radius:10px; font-size:14px; font-family:inherit;
    color:var(--text); background:#f8fafc; outline:none; transition:border-color .2s;
  }
  .ai-input-row input:focus { border-color:var(--blue-mid); background:#fff; }
  .ai-send-btn {
    padding:10px 16px; border-radius:10px; border:none;
    background:linear-gradient(135deg,var(--navy),var(--blue));
    color:#fff; font-size:18px; cursor:pointer; transition:all .15s;
    box-shadow:0 3px 10px rgba(26,86,219,.3); flex-shrink:0;
  }
  .ai-send-btn:active { transform:scale(.93); }
  .ai-send-btn:disabled { opacity:.4; cursor:not-allowed; }

  .ai-step2-btn {
    display:inline-flex; align-items:center; gap:4px;
    padding:5px 11px; border-radius:20px; border:none;
    background:var(--blue-light); color:var(--blue);
    font-size:11px; font-weight:700; cursor:pointer;
    font-family:'Noto Sans JP',sans-serif; margin-left:8px; transition:all .15s;
  }
  .ai-step2-btn:active { transform:scale(.95); }

    @media (max-width: 400px) {

</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <div class="header-icon">⛑️</div>
      <div>
        <div class="header-title">KY活動表</div>
        <div class="header-sub">危険予知活動 — 毎朝の安全確認</div>
      </div>
      <div class="offline-badge" id="netBadge">● オンライン</div>
    </div>
    <div class="tabs">
      <div class="tab active" id="tabForm" onclick="switchTab('form')">📝 新規入力</div>
      <div class="tab" id="tabRecords" onclick="switchTab('records')">📊 記録一覧</div>
      <div class="tab" id="tabAI" onclick="switchTab('ai')">🤖 安全AI</div>
    </div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-track" id="progressTrack"></div>
      <div class="progress-label">
        <div class="step-name" id="stepName"></div>
        <div class="step-count" id="stepCount"></div>
      </div>
    </div>
  </div>

  <div class="content" id="content"></div>

  <div class="footer" id="footer"></div>
</div>

<!-- Records Modal -->
<div class="modal-overlay" id="recordModal" style="display:none">
  <div class="modal">
    <div class="modal-title">
      <span>📋 記録詳細</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalContent"></div>
    <button class="btn btn-download" onclick="exportSingleRecord()" style="margin-top:16px">
      ⬇️ この記録をExcel出力
    </button>
  </div>
</div>

<script>
// ─── CONSTANTS ────────────────────────────────────────────────────
const STEPS = [
  { name: "基本情報",    icon: "📋" },
  { name: "作業内容",    icon: "🔨" },
  { name: "危険予知",    icon: "⚠️" },
  { name: "体調確認",    icon: "💪" },
  { name: "参加者",      icon: "👷" },
  { name: "確認・提出",  icon: "✅" },
];
const DAYS = ["日","月","火","水","木","金","土"];
const SEV_LABELS = { 1:"軽傷", 3:"重傷", 5:"致命的" };
const POS_LABELS = { 1:"あまりない", 3:"たまにある", 5:"よくある" };
const CHECKS_DEF = [
  { key:"condition",        label:"体調はいいか",     emoji:"💪" },
  { key:"attire",           label:"服装はいいか",     emoji:"👔" },
  { key:"ppe",              label:"保護具の所持",     emoji:"⛑️" },
  { key:"workUnderstanding",label:"作業内容の把握",   emoji:"📋" },
];

// ─── STATE ───────────────────────────────────────────────────────
let step = 0;
let currentTab = 'form';
let selectedModalRecord = null;
let form = freshForm();

function freshForm() {
  const now = new Date();
  return {
    date: now.toISOString().slice(0,10),
    dayOfWeek: DAYS[now.getDay()],
    company: "(株)警備サービス輝",
    leader: "",
    supervisor: "",
    workContent: "",
    todayPoint: "",
    hazards: [
      { point:"", severity:null, possibility:null, countermeasure:"", reeval:null },
      { point:"", severity:null, possibility:null, countermeasure:"", reeval:null },
      { point:"", severity:null, possibility:null, countermeasure:"", reeval:null },
    ],
    checks: { condition:null, attire:null, ppe:null, workUnderstanding:null },
    participants: ["","","","","",""],
  };
}

// ─── CONFIG ───────────────────────────────────────────────────────
// Paste your Google Apps Script Web App URL here after deploying:
const GOOGLE_SCRIPT_URL = https://script.google.com/macros/s/AKfycbylfWy_ghB6OTcUintVnjv5SEvbLdV9TS-MCoegQNoOIbaTVf_Im8HPMGHDW7oC-EW8/exec;
// ──────────────────────────────────────────────────────────────────

// ─── AUTH CHECK ──────────────────────────────────────────────────
(function checkAuth() {
  var auth = null;
  try { auth = localStorage.getItem('kyAuth') || sessionStorage.getItem('kyAuth'); } catch(e) {}
  if (!auth) { window.location.href = 'index.html'; return; }
  try {
    var a = JSON.parse(auth);
    if (!a || !a.ts || (Date.now() - a.ts > 12 * 60 * 60 * 1000)) {
      try { localStorage.removeItem('kyAuth'); } catch(e) {}
      window.location.href = 'index.html';
    }
  } catch(e) { window.location.href = 'index.html'; }
})();

function getSiteInfo() {
  var raw = null;
  try { raw = localStorage.getItem('kyAuth') || sessionStorage.getItem('kyAuth'); } catch(e) {}
  try { return JSON.parse(raw) || {}; } catch(e) { return {}; }
}

// ─── STORAGE ─────────────────────────────────────────────────────
function getRecords() {
  try { return JSON.parse(localStorage.getItem('kyRecords') || '[]'); }
  catch(e) { return []; }
}
function saveRecord(f) {
  const records = getRecords();
  const id = Date.now();
  records.unshift({ id, ...f });
  localStorage.setItem('kyRecords', JSON.stringify(records));
  return id;
}
function saveDraft(f) {
  localStorage.setItem('kyDraft', JSON.stringify(f));
}
function loadDraft() {
  try { return JSON.parse(localStorage.getItem('kyDraft')); } catch(e) { return null; }
}

// ─── OFFLINE QUEUE ────────────────────────────────────────────────
function getPendingQueue() {
  try { return JSON.parse(localStorage.getItem('kyPending') || '[]'); }
  catch(e) { return []; }
}
function addToPendingQueue(record) {
  const q = getPendingQueue();
  q.push(record);
  localStorage.setItem('kyPending', JSON.stringify(q));
}
function clearPendingQueue() {
  localStorage.removeItem('kyPending');
}

// ─── GOOGLE SHEETS SYNC ──────────────────────────────────────────
// Promise-based (no async/await) for full iOS Safari compatibility
function syncToGoogleSheets(records) {
  if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes('YOUR_GOOGLE')) {
    return Promise.resolve({ ok: false, reason: 'not_configured' });
  }
  var payload = Array.isArray(records) ? records : [records];
  return fetch(GOOGLE_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload)
  })
  .then(function(res) { return res.json(); })
  .then(function(data) { return { ok: data.status === 'ok', data: data }; })
  .catch(function(e) { return { ok: false, reason: 'network_error', error: e.message }; });
}

function submitAndSync(record) {
  var site = getSiteInfo();
  var fullRecord = Object.assign({}, record, { siteName: site.siteName || '' });

  // Always save locally first
  saveRecord(fullRecord);

  // Try to sync online
  if (navigator.onLine) {
    return syncToGoogleSheets(fullRecord).then(function(result) {
      if (result.ok) {
        // Flush pending offline queue
        var pending = getPendingQueue();
        if (pending.length > 0) {
          return syncToGoogleSheets(pending).then(function(batchResult) {
            if (batchResult.ok) clearPendingQueue();
            return { synced: true };
          });
        }
        return { synced: true };
      }
      // Sync failed — queue it
      addToPendingQueue(fullRecord);
      return { synced: false };
    }).catch(function() {
      addToPendingQueue(fullRecord);
      return { synced: false };
    });
  }

  // Offline — add to pending queue
  addToPendingQueue(fullRecord);

  // Register background sync if supported (Android Chrome)
  if ('serviceWorker' in navigator && 'SyncManager' in window) {
    navigator.serviceWorker.ready.then(function(reg) {
      try { reg.sync.register('ky-sync'); } catch(e) {}
    }).catch(function() {});
  }
  return Promise.resolve({ synced: false });
}

// Listen for SW sync signal
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'SYNC_REQUESTED') {
      var pending = getPendingQueue();
      if (pending.length > 0 && navigator.onLine) {
        syncToGoogleSheets(pending).then(function(result) {
          if (result.ok) clearPendingQueue();
        }).catch(function() {});
      }
    }
  });
}

// ─── NETWORK STATUS ──────────────────────────────────────────────
function updateNetStatus() {
  const badge = document.getElementById('netBadge');
  if (navigator.onLine) {
    badge.textContent = '● オンライン';
    badge.className = 'offline-badge';
  } else {
    badge.textContent = '● オフライン';
    badge.className = 'offline-badge offline';
  }
}
window.addEventListener('online', updateNetStatus);
window.addEventListener('offline', updateNetStatus);
updateNetStatus();

// ─── RISK HELPERS ────────────────────────────────────────────────
function riskScore(a, b) { return (a && b) ? a * b : null; }
function riskTag(score) {
  if (!score) return null;
  if (score >= 15) return { label:"重 ⚠️", cls:"risk-high", cardCls:"card-danger" };
  if (score >= 9)  return { label:"中 ▲", cls:"risk-mid",  cardCls:"card-warn"   };
  return               { label:"低 ✓", cls:"risk-low",  cardCls:"card-safe"  };
}
function scoreClass(val) {
  if (val === 1) return 'selected-low';
  if (val === 3) return 'selected-mid';
  if (val === 5) return 'selected-high';
  return '';
}

// ─── RENDER ENGINE ───────────────────────────────────────────────
function render() {
  try {
    renderProgress();
    renderContent();
    renderFooter();
    saveDraft(form);
  } catch(e) {
    console.error('render error:', e);
    // Show fallback content so screen is never blank
    var el = document.getElementById('content');
    if (el && !el.innerHTML) {
      el.innerHTML = '<div style="padding:20px;color:#ef4444;font-size:13px">読み込みエラー。ページを再読み込みしてください。<br><small>' + e.message + '</small></div>';
    }
  }
}


function renderProgress() {
  const track = document.getElementById('progressTrack');
  const nameEl = document.getElementById('stepName');
  const countEl = document.getElementById('stepCount');
  const pw = document.getElementById('progressWrap');

  if (currentTab === 'records' || currentTab === 'ai') {
    pw.style.display = 'none'; return;
  }
  pw.style.display = 'block';
  track.innerHTML = STEPS.map((s, i) => {
    const cls = i < step ? 'done' : i === step ? 'active' : '';
    return `<div class="progress-seg ${cls}"></div>`;
  }).join('');
  nameEl.textContent = STEPS[step].icon + ' ' + STEPS[step].name;
  countEl.textContent = `${step + 1} / ${STEPS.length}`;
}

function renderContent() {
  const el = document.getElementById('content');
  if (currentTab === 'records') { el.innerHTML = renderRecordsTab(); renderFooter(); return; }
  if (currentTab === 'ai')      { el.innerHTML = renderAITab();      renderFooter(); return; }
  el.innerHTML = [renderStep0, renderStep1, renderStep2, renderStep3, renderStep4, renderStep5][step]();
  attachStepListeners();
}

function renderFooter() {
  const el = document.getElementById('footer');
  if (currentTab === 'records') { el.innerHTML = ''; return; }
  if (step === 5) {
    el.innerHTML = `
      <button class="btn btn-back" onclick="goBack()">← 戻る</button>
      <button class="btn btn-submit" onclick="submitForm()">✅ 提出する</button>`;
    return;
  }
  el.innerHTML = `
    ${step > 0 ? '<button class="btn btn-back" onclick="goBack()">← 戻る</button>' : ''}
    <button class="btn btn-next" onclick="goNext()">次へ →</button>`;
}

// ─── STEP RENDERERS ───────────────────────────────────────────────
function renderStep0() {
  return `
  <div class="card card-accent">
    <div class="card-title"><span>📅</span> 日付・現場情報</div>
    <div class="field row2">
      <div>
        <label>日付</label>
        <input type="date" id="f_date" value="${form.date}">
      </div>
      <div style="width:70px">
        <label>曜日</label>
        <select id="f_day">${DAYS.map(d=>`<option ${form.dayOfWeek===d?'selected':''}>${d}</option>`).join('')}</select>
      </div>
    </div>
    <div class="field">
      <label>会社名</label>
      <input type="text" id="f_company" value="${esc(form.company)}" placeholder="会社名">
    </div>
    <div class="field">
      <label>リーダー名</label>
      <input type="text" id="f_leader" value="${esc(form.leader)}" placeholder="リーダーの名前">
    </div>
    <div class="field">
      <label>確認者</label>
      <input type="text" id="f_supervisor" value="${esc(form.supervisor)}" placeholder="確認者名">
    </div>
  </div>`;
}

function renderStep1() {
  return `
  <div class="card card-accent">
    <div class="card-title"><span>🔨</span> 作業内容</div>
    <div class="field">
      <label>今日の作業内容</label>
      <textarea id="f_workContent" placeholder="今日の作業内容を具体的に入力してください...">${esc(form.workContent)}</textarea>
    </div>
  </div>
  <div class="card">
    <div class="card-title"><span>💡</span> 今日のワンポイント</div>
    <div class="field">
      <textarea id="f_todayPoint" placeholder="安全のポイントやリーダーからの一言を入力..." style="min-height:70px">${esc(form.todayPoint)}</textarea>
    </div>
  </div>`;
}

function renderStep2() {
  const infoBox = `<div class="info-box" style="margin-bottom:14px">
    <strong>📐 評価基準</strong><br>
    重篤度（A）× 可能性（B）= ★危険度<br>
    危険度 <strong>15〜25：重</strong>　<strong>9：中</strong>　<strong>1〜5：低</strong><br>
    危険度15以上は対策後に再評価してください
  </div>`;
  const aiSuggestBox = `<div class="card" style="margin-bottom:14px;background:linear-gradient(135deg,#eff6ff,#f0fdf4);border:1.5px solid #bfdbfe;">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:24px">🤖</span>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700;color:var(--navy);margin-bottom:2px">AI安全検索で危険ポイントを自動入力</div>
        <div style="font-size:11px;color:var(--muted)">作業キーワードを検索して危険と対策をフォームに反映できます</div>
      </div>
      <button class="ai-step2-btn" onclick="openAISuggest()">🔍 AI検索</button>
    </div>
  </div>`;
  const hazardCards = form.hazards.map((h, i) => {
    const score = riskScore(h.severity, h.possibility);
    const tag = riskTag(score);
    const needsReeval = score && score >= 15;
    const borderColor = tag ? (tag.cls.includes('high') ? '#ef4444' : tag.cls.includes('mid') ? '#f97316' : '#10b981') : '#e2e8f0';
    return `
    <div class="hazard-card" id="hcard_${i}" style="border-left-color:${borderColor}">
      <div class="hazard-header">
        <div class="hazard-num">⚠️ 危険ポイント ${i+1}</div>
        ${tag && score ? `<span class="risk-badge ${tag.cls}">危険度 ${score} [${tag.label}]</span>` : ''}
      </div>
      <div class="field">
        <label>どのような危険がありますか？</label>
        <textarea id="h_point_${i}" placeholder="具体的な危険を記入..." style="min-height:70px">${esc(h.point)}</textarea>
      </div>
      <label>🔴 重篤度 (A) — 怪我の深刻さ</label>
      <div class="score-group" style="margin-bottom:14px">
        ${[1,3,5].map(v=>`
          <button class="score-btn ${h.severity===v?scoreClass(v):''}" onclick="setHazard(${i},'severity',${v})">
            <div class="score-val">${v}</div>
            <div class="score-lbl">${SEV_LABELS[v]}</div>
          </button>`).join('')}
      </div>
      <label>🟡 可能性 (B) — 発生の頻度</label>
      <div class="score-group" style="margin-bottom:14px">
        ${[1,3,5].map(v=>`
          <button class="score-btn ${h.possibility===v?scoreClass(v):''}" onclick="setHazard(${i},'possibility',${v})">
            <div class="score-val">${v}</div>
            <div class="score-lbl">${POS_LABELS[v]}</div>
          </button>`).join('')}
      </div>
      <div class="field">
        <label>🛡️ 私たちはこうする！（対策）</label>
        <textarea id="h_counter_${i}" placeholder="具体的な安全対策を記入..." style="min-height:70px">${esc(h.countermeasure)}</textarea>
      </div>
      ${needsReeval ? `
      <div class="warn-box" style="margin-bottom:10px">⚠️ 危険度が15以上のため対策後の再評価が必要です</div>
      <div class="field">
        <label>★ 再評価スコア (A×B の再計算)</label>
        <input type="number" id="h_reeval_${i}" min="1" max="25" placeholder="例：3" value="${h.reeval||''}">
      </div>` : ''}
    </div>`;
  }).join('');
  return aiSuggestBox + infoBox + hazardCards;
}

function renderStep3() {
  return `
  <div class="info-box" style="margin-bottom:14px">
    ○ 良い　×悪い — ×の場合はリーダーに報告し、対応しなければ作業に従事できません
  </div>
  ${CHECKS_DEF.map(c => `
  <div class="card" style="margin-bottom:14px">
    <div class="card-title"><span>${c.emoji}</span> ${c.label}</div>
    <div class="yn-group">
      <button class="yn-btn ${form.checks[c.key]==='good'?'yn-good':''}" onclick="setCheck('${c.key}','good')">○ 良い</button>
      <button class="yn-btn ${form.checks[c.key]==='bad'?'yn-bad':''}" onclick="setCheck('${c.key}','bad')">× 悪い</button>
    </div>
  </div>`).join('')}`;
}

function renderStep4() {
  return `
  <div class="card card-accent" style="margin-bottom:14px">
    <div class="card-title"><span>👷</span> 参加者サイン</div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.6">
      参加者全員の名前を入力してください。<br>
      実際の現場では自筆サインも必要です。
    </p>
    <div class="participant-grid">
      ${form.participants.map((p, i) => `
      <div class="participant-slot">
        <span class="participant-icon">👤</span>
        <input type="text" id="p_${i}" value="${esc(p)}" placeholder="参加者 ${i+1}">
      </div>`).join('')}
    </div>
  </div>`;
}

function renderStep5() {
  const activeP = form.participants.filter(Boolean);
  const hazardSummaries = form.hazards.filter(h => h.point).map((h, i) => {
    const score = riskScore(h.severity, h.possibility);
    const tag = riskTag(score);
    return `
    <div class="hazard-card" style="margin-bottom:10px;${tag?'border-left-color:'+(tag.cls.includes('high')?'#ef4444':tag.cls.includes('mid')?'#f97316':'#10b981'):''}">
      <div style="font-size:11px;color:var(--muted);font-weight:700;margin-bottom:6px">危険ポイント ${i+1}</div>
      <div style="font-size:13px;margin-bottom:8px">${esc(h.point)}</div>
      ${score ? `<span class="risk-badge ${tag.cls}" style="font-size:11px">危険度 ${score} [${tag.label}]</span>` : ''}
      ${h.countermeasure ? `<div style="font-size:12px;color:var(--muted);margin-top:8px">対策: ${esc(h.countermeasure)}</div>` : ''}
    </div>`;
  }).join('');

  return `
  <div class="card" style="margin-bottom:14px">
    <div class="card-title"><span>📋</span> 基本情報確認</div>
    ${row('日付', form.date + '（' + form.dayOfWeek + '）')}
    ${row('会社', form.company)}
    ${row('リーダー', form.leader || '—')}
    ${row('確認者', form.supervisor || '—')}
    ${row('作業内容', form.workContent || '—')}
    ${row('ワンポイント', form.todayPoint || '—')}
  </div>
  ${hazardSummaries}
  <div class="card" style="margin-bottom:14px">
    <div class="card-title"><span>✅</span> 体調確認</div>
    ${CHECKS_DEF.map(c => {
      const v = form.checks[c.key];
      const color = v === 'good' ? 'var(--safe)' : v === 'bad' ? 'var(--danger)' : 'var(--muted)';
      const label = v === 'good' ? '○ 良い' : v === 'bad' ? '× 悪い' : '未回答';
      return `<div class="summary-row"><span class="summary-key">${c.label}</span><span style="color:${color};font-weight:700">${label}</span></div>`;
    }).join('')}
  </div>
  ${activeP.length ? `
  <div class="card">
    <div class="card-title"><span>👷</span> 参加者 (${activeP.length}名)</div>
    ${activeP.map(p => `<div class="summary-row"><span>👤 ${esc(p)}</span></div>`).join('')}
  </div>` : ''}`;
}

function row(k, v) {
  return `<div class="summary-row"><span class="summary-key">${k}</span><span class="summary-val">${esc(v)}</span></div>`;
}

// ─── RECORDS TAB ─────────────────────────────────────────────────
function renderRecordsTab() {
  const records = getRecords();
  if (!records.length) {
    return `<div class="card" style="text-align:center;padding:40px 20px">
      <div style="font-size:48px;margin-bottom:12px">📭</div>
      <div style="font-weight:700;color:var(--muted)">記録がまだありません</div>
      <div style="font-size:12px;color:var(--muted);margin-top:6px">KY活動を入力して提出すると<br>ここに記録されます</div>
    </div>`;
  }
  return `
  <button class="btn btn-download" onclick="exportAllRecords()" style="margin-bottom:14px">

    if (pt) pt.addEventListener('input', e => { form.hazards[i].point = e.target.value; saveDraft(form); });

function setHazard(i, key, val) {

  form.hazards.forEach((h, idx) => {

// ─── NAVIGATION ──────────────────────────────────────────────────
function collectCurrentStep() {
  if (step === 0) {
    const d = v('f_date'), day = v('f_day'), co = v('f_company'),
          le = v('f_leader'), su = v('f_supervisor');
    if (d) form.date = d; if (day) form.dayOfWeek = day;
    if (co !== null) form.company = co;
    if (le !== null) form.leader = le;
    if (su !== null) form.supervisor = su;
  }
  if (step === 1) {
    const wc = v('f_workContent'), tp = v('f_todayPoint');
    if (wc !== null) form.workContent = wc;
    if (tp !== null) form.todayPoint = tp;
  }
  if (step === 2) {
    form.hazards.forEach((h, i) => {
      const pt = v(`h_point_${i}`), ct = v(`h_counter_${i}`), rv = v(`h_reeval_${i}`);
      if (pt !== null) h.point = pt;
      if (ct !== null) h.countermeasure = ct;
      if (rv !== null) h.reeval = parseInt(rv) || null;
    });
  }
  if (step === 4) {
    form.participants.forEach((_, i) => {
      const pv = v(`p_${i}`);
      if (pv !== null) form.participants[i] = pv;
    });
  }
}
function v(id) {
  const el = document.getElementById(id);
  return el ? el.value : null;
}
function goNext() {
  collectCurrentStep();
  if (step < STEPS.length - 1) { step++; render(); scrollTop(); }
}
function goBack() {
  collectCurrentStep();
  if (step > 0) { step--; render(); scrollTop(); }
}
function scrollTop() {
  document.getElementById('content').scrollTop = 0;
}

function switchTab(t) {
  currentTab = t;
  document.getElementById('tabForm').className    = 'tab' + (t==='form'?    ' active':'');
  document.getElementById('tabRecords').className = 'tab' + (t==='records'? ' active':'');
  document.getElementById('tabAI').className      = 'tab' + (t==='ai'?      ' active':'');

      <div class="success-icon" id="submitIcon" style="animation:none">⏳</div>

    </div>`;
  document.getElementById('footer').innerHTML = '';

  // Use promise chain instead of async/await for iOS Safari compatibility
  submitAndSync(form).then(function(result) {
    var icon    = document.getElementById('submitIcon');
    var title   = document.getElementById('submitTitle');
    var sub     = document.getElementById('submitSub');
    var actions = document.getElementById('submitActions');

      sub.innerHTML = 'KY活動表を記録し、<strong style="color:var(--safe)">Googleスプレッドシートに送信しました</strong>。';
    } else {
      icon.textContent  = '💾';
      icon.style.animation = '';
      title.textContent = 'オフライン保存';
      sub.innerHTML = '端末に保存しました。<br><span style="color:var(--accent)">オンライン復帰時に自動送信されます（待機' + pending.length + '件）</span>';
    }

    // Safely append action buttons
    if (actions) {
      actions.innerHTML = `
        <button class="btn btn-download" onclick="exportCurrentRecord()">⬇️ Excelでダウンロード</button>
        <button class="btn-new" onclick="startNew()">📝 新しいKY活動を開始</button>

          🔒 ログアウト

  }).catch(function(err) {

    var icon  = document.getElementById('submitIcon');
    var title = document.getElementById('submitTitle');

// Convert "A1" → {r:0, c:0}  (0-based)
function cellRef(addr) {
  const m = addr.match(/^([A-Z]+)(\d+)$/);
  const col = m[1].split('').reduce((acc,ch) => acc*26 + ch.charCodeAt(0)-64, 0) - 1;
  return { r: parseInt(m[2]) - 1, c: col };
}

function makeCell(ws, addr, value, styleHint) {
  const ref = cellRef(addr);
  const key = XLSX.utils.encode_cell(ref);
  const t = (typeof value === 'number') ? 'n' : 's';
  ws[key] = { v: value, t, s: styleHint || {} };
}

function addMerge(ws, tl, br) {
  if (!ws['!merges']) ws['!merges'] = [];
  ws['!merges'].push({ s: cellRef(tl), e: cellRef(br) });
}

// Column letter from 1-based index
function colLetter(n) {
  let s = '';
  while (n > 0) { s = String.fromCharCode(64 + (n % 26 || 26)) + s; n = Math.floor((n-1)/26); }
  return s;
}

function buildKYSheet(data) {
  const ws = {};

  ws['!ref'] = 'A1:BE52';

  // Row heights: all 20.1, row 52 = 18
  ws['!rows'] = [];
  for (let i = 0; i < 52; i++) ws['!rows'].push({ hpt: i === 51 ? 18 : 20.1 });

  // Column width: A=4.375, others default
  ws['!cols'] = [{ wpx: 33 }]; // Col A narrow

  const merges = [];
  const addM = (tl, br) => merges.push({ s: cellRef(tl), e: cellRef(br) });

  // Helper to set cell
  const C = (addr, val, style) => {
    const ref = cellRef(addr);
    const key = XLSX.utils.encode_cell(ref);
    const t = (val === null || val === undefined || val === '') ? 's'
             : (typeof val === 'number') ? 'n' : 's';
    ws[key] = { v: (val !== null && val !== undefined) ? val : '', t, s: style || {} };
  };

  // ── Row 1-4: Title ───────────────────────────────────────────
  const d = data.date || '';

function exportToXLSX(records) {
  const wb = XLSX.utils.book_new();

  records.forEach((r, idx) => {
    const ws = buildKYSheet(r);
    const dateStr  = (r.date || '').replace(/-/g,'');
    const leader   = (r.leader || '記録').replace(/[\/\\?*\[\]:]/g,'');
    let sheetName  = `${dateStr}_${leader}`.slice(0, 31);
    // Ensure unique
    const used = wb.SheetNames || [];
    let base = sheetName, n = 1;
    while (used.includes(sheetName)) { sheetName = `${base}_${n++}`.slice(0,31); }
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
  });

  const fileName = records.length === 1
    ? `KY活動表_${records[0].date||'記録'}.xlsx`
    : `KY活動表_集計_${new Date().toISOString().slice(0,10)}.xlsx`;
  XLSX.writeFile(wb, fileName);
}

function exportAllRecords() {
  const records = getRecords();
  if (!records.length) { alert('記録がありません'); return; }
  exportToXLSX(records);
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

  mowing: '7.除草作業における事故\n7.除草作業における事故\n注）折れ線グラフは飛び石事故数を示す 『除草作業における事故』は、事故件数が減小したことから、H27年\n4 その他 4件 3件 がら遠隔操縦式草刈機に身体が挟まれる事故が発生しました。大型\n除草作業の事故に注意\n昨年度除草時の事故は13件発生しました。本年度はより一層の安全対策を講じ、発\n生件数を1件でも減らすように取り組みましょう。（除草作業については、平成30年\n度工事等事故防止重点対策項目です。） 重点：除草作業\nり等で先行除草するなどしておきましょう。\n●肩掛け式草刈機の刃の確認\n• 刈刃の回転にブレが無いか確認しましょう。 安全距離の確保\n除草作業について\n除草作業中は\n重点：除草作業\n肩掛式草刈機の注意点\nハンドガイド式草刈り機の注意点\n所から飛んだ事例もみられます。飛び石対策は確実に行いましょう。\n遠隔操作式草刈り機の注意点\n草刈機本体へ「点検時、エンジンを切れ!」等の注意ステッカーを貼りましょう。\n刈払機の注意事項が掲載されています。\n【事例１】堤防法面除草作業の翌日に民家\n作業は除草作業員１名、飛石防止ネット２\n重点：除草作業\n飛び石防止ネット\n【事例２】道路維持の除草作業（肩掛式草刈り機）で、遮音壁周辺を草刈り中、小石を飛ばし遮\n除草作業における事故防止については、平成30年5月（あんぜん第285号）に\n電動カッターだけでなく、チェンソーや肩掛式除草機を使用した作業においても、工事関係者が負傷する事\n​除草･伐採作業時の作業員被災事故が\n【事故概要】 路肩法面の除草中に、草刈り作 【事故概要】 線路沿いの雑木を伐採中に線路\n飛び石防止ネット支持者 付近を擦傷させた。当日予\n草刈り機・チェンソーの取扱時の注意点\n⑦除草作業における事故\n⑥除草作業における事故\n肩掛式草刈り機による除草作業について\n付けていても、飛び石などの事故が発生しており、飛散物を完全に防ぐことは出来ません。\n防護ネットを設置して飛び石対策を行いましょう。\n場合があります。草刈り作業員並びに防護作業員は必ず保護メガネ、\n作業前には 作業前には刈刃が正しく取り付けられ、締めつけられていることを確認 服装を！\n距離標、杭、ケーブルには目印をつけ、周囲を手刈り等で先行除草を行いましょう。\n（出典：独立行政法人国民生活センターＨＰ「草刈機使用で失明の危険」http://www.kokusen.go.jp/index.html ）\n肩掛け式草刈り機は気軽に扱えるためにその危険性を軽視してし\n（b）独立行政法人国民生活センターには「刈払機（草刈機）の使用中の事故にご注意くださ\nい ！ 」に草刈り機の危険性についてまとめられています。\n除草作業 重点対策項目（全体）の\n⑥ 除草作業における事故（継続）',
  weather: '降雨に注意\n大雨、強風等の異常気象又は地震、水質事故、工事事故などが発生した場\n【大雨に対する措置（作業現場及び周辺の整備）】\n危険を察知した場合には、基準内にあっても気象の状況に応じて警戒・点検・作業中止等を実施し、安\n強風予測は認識していたが、固定状況の確認を\n気象情報に注意\n響はなくても、日本周辺の台風の動きにも注意が必要です。大雨や強風に対し、工事現場の安全を確\n保するとともに、第３者への被害拡大防止のため、注意報・警報の発令情報だけでなく、気象情報全\n⑤ 湾岸・河川に注意 強風により資機材が流出する可能性がありま\nす。強風が予想される場合は安全な場所に資機材を移動させま\n① 排水設備の点検を ゲリラ豪雨等では排水設備の許容量を超える恐れ があります。またゴミ等\n② 穴・段差の点検を 降雨により、バイクや自動車の事故の原因になります。\n④ 緩んだ斜面に注意 切土法面、盛土等は降雨で崩れやすくなります。\n⑥ 河川の増水に注意 増水により資機材が流出する可能性があります。大雨が予想される場合は\n⑦ 大雨の後は点検を 地盤の緩みで崩落、陥没等思わぬ危険があります。\n労働安全衛生法では、大雨等、悪天候後に再び作業を開始する際の設備等の\n突風による飛散事故が発生しました。強風の予報が出ていなくても突風によって工事関係機材が飛散す\n暴風警報・強風注意報の発表がない場合、これまでの対策を踏まえて十分な固定をし\nまた、強風注意報など気象警報が発令された際には、設置物の臨時点検を行うととも\n保安用具や機材などを厳重に固定し、強風対策を行いましょう。\n大雪等の悪天候のため、当該作業の実施について危険が予想されるときは、当該作業\n大雨や強風などによる影響がないか確認しましょう。飛散しそうな保安用具や看板、資材な\n（b）気象庁では高温注意情報を発表しており、HPでも確認できます。\n号改正以降初の台風も発生しています。台風は、梅雨前線の活動\n長時間に渡る降雨にも注意が必要です。\n● 大雨による土砂や濁水の流出を防止するため、特に施工途中\nあんぜん第299号（令和元年7月号）に悪天候時の点検ポイントを紹介しています。参考\n悪天候や視界不良時には昼間点灯を実施しましょう。こちらの存在を知ら',
  traffic: '車両侵入防止対策\nもらい事故発生件数\n規制中の安全対策だけではなく、現場への移動の際にも十\n交通誘導員の安全対策について\n今年度は交通誘導員が被災するもらい事故は発生していませんが、引き続き第三者が運転する自動車\n• 交通誘導員が被災するもらい事故は夜間0時から3時に多く発生します。\n◆交通誘導における注意点\nペースを常に確保し、通行車両には背を向けないよう徹底しましょう。\n• 交通誘導員は、クッションドラム後方の歩道側に立って危険を感じた時に退避しやす\n• 停止線近くになっても一般車両が速度を落とさないような場合、危険を避けられる姿\n【事故概要】 交通規制内の工事用の安\n片側交互通行規制中の事故が多発しています。特に夜中（午前３時台）や夕方に多く発生しています。\n施設の撤去がほぼ終了し、規制の解除に向け、注意 停止位置に２台（大型トラック、乗用車）が停止し\n一般車両の規制区間への突っ込み事故に注意！\n道路規制中の工事はもらい事故と隣り合わせであることを作業員全員が留意し、作業を行いましょう。\n不注意により一般車両が突っ込んでくることを想定し、今一度対策の確認を行いましょう。\n一般車両が停止指示に従わず身の危険を感じた場合、交通誘導員は直ちに安全な場所に避難しましょう。\n道路法・道路交通法（特殊車両許可）に適合しているか等、事前確認を徹底しましょう。\n現場規制区域内への出入口の入口側と出口側でそれぞれ異なる文言（手合図）の事故防止看板を設\nた作業員が落下し、負傷した。作業員の独断により、予定外の作業となる規制区域外での作業を行ったことが\n②発信機器を搭載した車両など、事前現地調査では把握しきれないことも考えられることから、車両通行制限の\n誘導員や確認者が一度に複数台の車両に対応することのないよう、調整を行いましょう。\n⑦特殊車両通行許可等違反による事故\n必要に応じて誘導員を配置し、通行車両及び通行人の安全を確保するとともに、作業の安全\n物等の破損、車両の単独事故など、様々な事故が発生しており、その事故のほとんどが運転手の不注意\n１ ４月３日 除雪トラックにて凍結防止剤を散布していたところ、後方から一般車両に追突された。\n１９ ６月２９日 一般車両が工事現場の占用帯に進入し、安全施設を破損させた。\n※2019年4月～6月までに発生した車両関連の事故（もらい事故含む）\nとなっています。今年度においては、7月末時点で4件の被害が発生していますが、そのうち、交通誘導員\nし等、落下物の危険性を伴う場合においては、交通誘導警備員を配置し一般交通等の規制を行う等落下\n※1：総発生件数988件（平成27年4月1日～平成2年１月末日まで） ⑥特車車両通行許可違反による事故\n⑦ 特殊車両通行許可等違反による事故（継続）\n②誘導員の配置\n・路肩、法肩等危険な場所での建設機械作業や人と建設機械との共同作業となる場合には、誘導員を\n適正に配置するとともに、誘導方法、合図等を確認し、オペレータと誘導員が連携して人（作業員',
  general: '平成29年度直轄工事等事故発生状況（速報値）\n平成25年度 年度別工事等事故発生件数（累計） 211\n平成26年度 月別工事等事故発生件数\n年度の開始直後は、ここ数年間の平均レベルで推移していましたが、夏季の発生件数が少なかったこともあ\n例年2月には、多くの事故が発生する傾向がありましたが、今年度はその傾向は見られませんでした。3月も作\n業員１人１人の安全に対する意識を高め、年間最小件数となるように、職場全体が一丸となって工事事故防止に\n今一度、現場及び周辺の点検と安全確認を確実に行いましょう\n協議(回答）書等を確認し、立会するなど十分な安全対策を実施して事故を防止しましょう。\n（あんぜん平成30年2月号 第282号の再掲）\n【事故概要】\n2018年1月10日事故発生。車道の拡幅に伴う交差点右折\n③施工計画・作業方法の検討\n建設業年度末労働災害防止強調月間\n実施期間：平成30年3月1日～3月31日\n主催：建設業労働災害防止協会\n建設業年度末労働災害防止強調月間は、厚生労働省ならびに国土交通省の後援のもと、工事の輻輳化\nや季節的な災害により増加する年度末の労働災害防止のために、上記の期間に実施致します。\n実施にあたっては、「建設業労働災害防止規程」および「平成29年度建設業労働災害防止対策実施事\n項」等を活用し、積極的に労働災害防止活動を実施してください。\n平成30 年度工事等事故防止重点対策項目を策定！\n4. 資材・仮設材及び工具の飛来落下による事故\nな影響を及ぼす恐れがある事故や、ひとたび発生すると重大事故に\n繋がる恐れがある事故について「工事等事故防止重点対策項目」と\n位置付け、重点的に事故防止に取り組んでいます。\n着実に成果の出ている項目もありますが、これらは重大事故につながる危険要因であるため、継続\nして重点対策項目とすることで事故防止に万全を期することとします。受発注者が一体となった取\n平成29年度工事等事故防止重点対策7項目における事故件数\n度に事故防止重点対策項目から除外されました。しかしH27年度の事\n8 その他 年度に重点対策項目に再策定されました。\n1件 今年度はH28年度の2倍近い事故が発生しました。搭乗式のハンド\n新規入場者とは、「新しく現場に入ってきた職員、作業員」のことです。4月は新規入場者が多くな\nることから、十分な安全教育と特別な配慮が必要です。\n●書類確認の徹底\n必要な書類の提出を求めるだけではなく、持病や怪我の有無の確認を行いましょう。持病や怪\n我の有無の確認は、危険リスクを事前に排除することができます。なお、プライバシーには配慮\nしながら実施してください。\n●安全教育の実施\n新規入場者の多くは現場の状況、危険箇所や現場のルールなどについて知識・情報が十分では\nありません。現場に入る前には事前に安全教育を行う必要があります。安全教育は各工事現場の\n新規入場者教育の実施内容\n① 作業所の安全衛生計画の内容（工事概要と作業所の方針）\n② 労働者が混在して作業を行う場所の状況\n③ 労働者に危険を生じる箇所の状況（危険有害箇所と立入禁止区域）\n④ 混在作業場所において行われる作業相互の関係\n⑤ 避難の方法\n⑥ 指揮命令系統\n⑦ 担当する作業内容と労働災害防止対策\n⑧ 安全衛生に関する規定\n厚生労働省策定「元方事業者による建設現場安全管理指針」（H7.4)\n現場はチームワーク作業のため、小さな作業でも合図や確認の声掛けが重要ですが、新規入場\nルールによって現場全員の安全が保たれていることを理解し、責任ある行動を行うよう周知徹\n早めの対策を講じましょう。\n風通しの良い日陰など、涼しい場所へ避難させる。 ①\n①露出させた皮膚に水をかけ、うちわや扇風機などであおぐことで体を冷やします\n②氷のうなどがあれば、それを首すじ、 脇の下、 大腿の付け根、股関節あたりに\nイラスト：農林水産省ＨＰ「農作業安全研修資料等」を利用して作成\n飛散防止装置\n※虫刺され、草まけ、トゲ刺し等の防止のため、\n●作業場の状況を確認\n• 作業範囲の清掃、石など危険なものは撤去しましょう。\n• 刃に損傷などないか確認しましょう。\n• 刃にガタツキはありませんか、ガタツキがあると切れにくく、危険です。\n閉状態）の確認をします。手動チョークの場合はエンジン始動後の戻し忘れ\nに注意します。\n• エンジンをかける前に周囲に人や物、可燃物がないか確認します。\nが地面や障害物に触れていない事を確認してください。\n作業に集中すると周囲への注意が散漫になります。作業範囲、順序などを十分に\n転が止まっ var aiMessages = [];   // {role:'bot'|'user', text:string}

// Topic detector → pick relevant chunk
function detectTopic(msg) {
  var m = msg.toLowerCase();
  if (/掘削|埋設|地下|試掘|管路/.test(m))         return 'excavation';
  if (/熱中症|暑|wbgt|水分|休憩/.test(m))          return 'heat';
  if (/重機|バックホウ|クレーン|玉掛|架空線/.test(m)) return 'machinery';
  if (/墜落|足場|高所|ハーネス|安全帯/.test(m))      return 'fall';
  if (/除草|草刈|刈刃|飛び石/.test(m))              return 'mowing';
  if (/雨|風|台風|悪天候|気象/.test(m))             return 'weather';
  if (/交通|誘導|規制|もらい/.test(m))              return 'traffic';
  return 'general';
}

      '<div style="font-weight:800;color:var(--navy);margin-bottom:6px">AI安全アシスタント</div>' +

    '</div>';

        '<span></span><span></span><span></span></div></div></div>';
    }
  }

  var fillBanner = (lastAIDangers.length > 0) ?

      '<div class="ai-chat-header-icon">🤖</div>' +
      '<div><div class="ai-chat-header-title">AI安全アシスタント</div>' +

    fillBanner +
    '<div class="ai-input-row">' +
      '<input type="text" id="aiInput" placeholder="例：掘削作業の危険は？" ' +
        'onkeydown="if(event.key===\'Enter\')sendAIMessage()">' +
      '<button class="ai-send-btn" id="aiSendBtn" onclick="sendAIMessage()" ' +
        (aiTyping ? 'disabled' : '') + '>📤</button>' +
    '</div>' +
  '</div>';
}

// ─── SEND MESSAGE ─────────────────────────────────────────────────
function sendAIMessage(preset) {
  var input = document.getElementById('aiInput');
  var msg   = preset || (input ? input.value.trim() : '');
  if (!msg || aiTyping) return;
  if (input) input.value = '';

  // Add user message
  aiMessages.push({ role:'user', html: esc(msg) });
  aiTyping = true;

  // Re-render
  var el = document.getElementById('content');
  if (el) { el.innerHTML = renderAITab(); scrollAIMessages(); }

  // Pick relevant context chunk
  var topic   = detectTopic(msg);
  var context = SAFETY_CHUNKS[topic] || SAFETY_CHUNKS['general'] || '';

  var systemPrompt =
    'あなたは日本の建設工事現場の安全管理専門家です。' +
    '近畿地方整備局が発行した「あんぜん」安全情報誌（第283号〜310号）の内容に基づいて回答してください。' +
    '以下の資料抜粋を参考にしてください:\n\n' + context + '\n\n' +
    '回答形式：\n' +
    '1. ⚠️危険ポイントを箇条書き（最大4つ）\n' +
    '2. ✅対策・注意事項を箇条書き（最大4つ）\n' +
    '3. 最後に必ず以下のJSONを出力（フォーム反映用）:\n' +
    'FILL_DATA:{"dangers":["危険1","危険2"],"measures":["対策1","対策2"]}\n\n' +
    '日本語で簡潔に回答してください。';

  // Route through Google Apps Script proxy to avoid CORS
  fetch(GOOGLE_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      type: 'ai_chat',
      system: systemPrompt,
      message: msg
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var raw = '';
    if (data.status === 'ok') raw = data.response || '';
    else raw = 'エラー: ' + (data.message || '不明なエラー');

    // Extract FILL_DATA JSON if present
    var fillMatch = raw.match(/FILL_DATA:\{[^}]+\}/);
    if (fillMatch) {
      try {
        var fd = JSON.parse(fillMatch[0].replace('FILL_DATA:', ''));
        lastAIDangers  = fd.dangers  || [];
        lastAIMeasures = fd.measures || [];
      } catch(e) {}
      raw = raw.replace(/FILL_DATA:\{[^}]+\}/, '').trim();
    }

    // Format the response as HTML
    var html = formatAIResponse(raw);
    aiMessages.push({ role:'bot', html: html });
    aiTyping = false;

    var el2 = document.getElementById('content');
    if (el2) { el2.innerHTML = renderAITab(); scrollAIMessages(); }
  })
  .catch(function(err) {
    aiMessages.push({ role:'bot', html: '<span style="color:var(--danger)">⚠️ エラー: ' + esc(err.message) + '</span>' });
    aiTyping = false;
    var el2 = document.getElementById('content');
    if (el2) { el2.innerHTML = renderAITab(); scrollAIMessages(); }
  });
}

function formatAIResponse(text) {
  // Convert markdown-style to HTML
  var lines = text.split('\n');
  var html = [];
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) { html.push('<br>'); continue; }
    // Bold **text**
    line = line.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    // Danger markers
    if (/^[⚠️・•\-]|^\d+\./.test(line) && (line.indexOf('危険') >= 0 || line.indexOf('事故') >= 0 || line.indexOf('リスク') >= 0)) {
      html.push('<li><span class="warn">' + line.replace(/^[⚠️・•\-\d\. ]+/, '') + '</span></li>');
    } else if (/^[✅・•\-]|^\d+\./.test(line) && (line.indexOf('対策') >= 0 || line.indexOf('確認') >= 0 || line.indexOf('徹底') >= 0 || line.indexOf('しましょう') >= 0)) {
      html.push('<li><span class="safe">' + line.replace(/^[✅・•\-\d\. ]+/, '') + '</span></li>');
    } else if (line.startsWith('⚠️') || line.startsWith('1. ⚠') || line === '⚠️危険ポイント' || line.includes('危険ポイント')) {
      html.push('<strong style="color:var(--danger)">' + line + '</strong><ul>');
    } else if (line.startsWith('✅') || line === '✅対策' || line.includes('対策・注意')) {
      html.push('</ul><strong style="color:var(--safe)">' + line + '</strong><ul>');
    } else {
      html.push(line);
    }
  }
  return html.join('') + '</ul>';
}

function scrollAIMessages() {
  setTimeout(function() {
    var el = document.getElementById('aiMessages');
    if (el) el.scrollTop = el.scrollHeight;
  }, 50);
}

// ─── FILL KY FORM FROM AI RESULT ─────────────────────────────────
function fillHazardFromAI() {
  if (!lastAIDangers.length) return;
  form.hazards.forEach(function(h, i) {
    if (i < lastAIDangers.length  && lastAIDangers[i])  h.point           = lastAIDangers[i];
    if (i < lastAIMeasures.length && lastAIMeasures[i]) h.countermeasure  = lastAIMeasures[i];
  });
  saveDraft(form);
  step = 2;
  switchTab('form');
  showToast('✅ ' + Math.min(lastAIDangers.length, 3) + '件の危険ポイントをKYフォームに反映しました');
}

// ─── AI BUTTON IN STEP 2 ──────────────────────────────────────────
function openAISuggest() {
  if (form.workContent) {
    setTimeout(function() { sendAIMessage(form.workContent.substring(0, 30) + 'の危険ポイントを教えてください'); }, 100);
  }
  switchTab('ai');
}

// ─── TOAST ────────────────────────────────────────────────────────
function showToast(msg) {
  var t = document.getElementById('kyToast');
  if (t) t.remove();
  var toast = document.createElement('div');
  toast.id = 'kyToast';
  toast.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);' +
    'background:#1e293b;color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;' +
    'font-weight:700;z-index:9999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3);' +
    'font-family:Noto Sans JP,sans-serif;max-width:90vw;text-align:center;';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(function() { if (toast.parentNode) toast.remove(); }, 3000);
}

// ─── SERVICE WORKER ───────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(reg => console.log('SW registered:', reg.scope))
    .catch(err => console.log('SW registration failed:', err));
}

// ─── INIT ─────────────────────────────────────────────────────────
(function init() {
  const draft = loadDraft();
  if (draft) {
    // Merge draft carefully
    form = { ...freshForm(), ...draft };
    form.hazards = (draft.hazards || []).map(h => ({ ...{point:'',severity:null,possibility:null,countermeasure:'',reeval:null}, ...h }));
    form.checks = { ...freshForm().checks, ...(draft.checks || {}) };
    form.participants = draft.participants || freshForm().participants;
  }
  render();
})();
</script>
