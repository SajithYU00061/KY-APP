// ─── AI SEARCH STATE ──────────────────────────────────────────────
var aiState = { loading: false, result: null, error: null, keyword: '' };
var lastAIResult = null; // stores parsed result for form-fill

// ─── AI TAB RENDERER ─────────────────────────────────────────────
function renderAITab() {
  var chips = ['掘削作業','熱中症','架空線','バックホウ','足場','玉掛け','除草作業','地下埋設管','交通誘導','高所作業'];
  var chipsHtml = chips.map(function(c) {
    return '<button class="ai-chip" onclick="runAISearch('' + c + '')">' + c + '</button>';
  }).join('');

  var resultHtml = '';
  if (aiState.loading) {
    resultHtml = '<div class="ai-loading"><div class="ai-spinner"></div><div class="ai-loading-text">AIが安全資料を検索中...</div></div>';
  } else if (aiState.error) {
    resultHtml = '<div class="ai-error">⚠️ ' + esc(aiState.error) + '</div>';
  } else if (aiState.result) {
    resultHtml = renderAIResult(aiState.result, aiState.keyword);
  } else {
    resultHtml = '<div class="ai-empty"><div class="ai-empty-icon">🔍</div><div class="ai-empty-title">作業キーワードを入力</div><div class="ai-empty-sub">キーワードを入力するか下のボタンを押すと<br>安全資料から危険ポイントと対策を抽出します</div></div>';
  }

  return '<div class="ai-wrap">' +
    '<div class="ai-search-box">' +
      '<div class="card-title"><span>🤖</span> AI安全検索</div>' +
      '<div class="ai-input-row">' +
        '<input type="text" id="aiInput" placeholder="例：掘削、熱中症、バックホウ..." value="' + esc(aiState.keyword) + '" onkeydown="if(event.key==='Enter')runAISearch()">' +
        '<button class="ai-search-btn" id="aiBtn" onclick="runAISearch()" ' + (aiState.loading ? 'disabled' : '') + '>検索</button>' +
      '</div>' +
      '<div class="ai-chips">' + chipsHtml + '</div>' +
    '</div>' +
    resultHtml +
  '</div>';
}

function renderAIResult(result, keyword) {
  var dangersHtml = (result.dangers || []).map(function(d) {
    return '<div class="ai-item danger-item">⚠️ ' + esc(d) + '</div>';
  }).join('');
  var measuresHtml = (result.measures || []).map(function(m) {
    return '<div class="ai-item safe-item">✅ ' + esc(m) + '</div>';
  }).join('');
  var casesHtml = (result.cases || []).map(function(c) {
    return '<div class="ai-item case-item">📋 ' + esc(c) + '</div>';
  }).join('');

  var hasContent = (result.dangers && result.dangers.length > 0) ||
                   (result.measures && result.measures.length > 0);

  if (!hasContent) {
    return '<div class="ai-empty"><div class="ai-empty-icon">🔍</div><div class="ai-empty-title">該当情報なし</div><div class="ai-empty-sub">「' + esc(keyword) + '」に関する情報が資料に見つかりませんでした。<br>別のキーワードをお試しください。</div></div>';
  }

  return '<div class="ai-result">' +
    '<div class="ai-result-header">' +
      '<span style="font-size:18px">🔍</span>' +
      '<span class="ai-keyword">「' + esc(keyword) + '」の安全情報</span>' +
      '<span class="ai-badge">あんぜん資料より</span>' +
    '</div>' +
    '<div class="ai-result-body">' +
      (dangersHtml ? '<div class="ai-section"><div class="ai-section-title danger">⚠️ 危険ポイント</div>' + dangersHtml + '</div>' : '') +
      (measuresHtml ? '<div class="ai-section"><div class="ai-section-title safe">🛡️ 対策・注意事項</div>' + measuresHtml + '</div>' : '') +
      (casesHtml ? '<div class="ai-section"><div class="ai-section-title case">📋 事故事例・参考</div>' + casesHtml + '</div>' : '') +
      '<button class="ai-fill-btn" onclick="fillHazardFromAI()">📋 KYフォームに反映する</button>' +
    '</div>' +
  '</div>';
}

// ─── RUN AI SEARCH ────────────────────────────────────────────────
function runAISearch(keyword) {
  var input = document.getElementById('aiInput');
  var kw = keyword || (input ? input.value.trim() : '');
  if (!kw) return;

  aiState.keyword = kw;
  aiState.loading = true;
  aiState.result = null;
  aiState.error = null;
  lastAIResult = null;

  // Update input field if chip was clicked
  if (input) input.value = kw;

  // Re-render to show loading state
  var el = document.getElementById('content');
  if (el) {
    el.innerHTML = renderAITab();
  }

  // Build prompt
  var prompt = '以下の安全資料から「' + kw + '」に関する情報を抽出してください。\n\n' +
    '回答はJSON形式のみで返してください（他のテキストは不要）:\n' +
    '{\n' +
    '  "dangers": ["危険ポイント1", "危険ポイント2", ...],\n' +
    '  "measures": ["対策1", "対策2", ...],\n' +
    '  "cases": ["事故事例や参考情報1", ...]\n' +
    '}\n\n' +
    '各配列は最大5項目。簡潔な日本語で。資料に記載がない場合は空配列にしてください。\n\n' +
    '=== 安全資料 ===\n' + SAFETY_KNOWLEDGE.substring(0, 40000);

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    var text = '';
    if (data.content && data.content[0]) text = data.content[0].text || '';
    // Strip markdown fences
    text = text.replace(/```json/g,'').replace(/```/g,'').trim();
    try {
      var parsed = JSON.parse(text);
      aiState.result = parsed;
      lastAIResult = parsed;
      lastAIResult.keyword = kw;
    } catch(e) {
      aiState.error = 'AI応答の解析に失敗しました。もう一度お試しください。';
    }
    aiState.loading = false;
    var el2 = document.getElementById('content');
    if (el2) el2.innerHTML = renderAITab();
  })
  .catch(function(err) {
    aiState.error = 'ネットワークエラー: ' + err.message;
    aiState.loading = false;
    var el2 = document.getElementById('content');
    if (el2) el2.innerHTML = renderAITab();
  });
}

// ─── FILL KY FORM FROM AI RESULT ─────────────────────────────────
function fillHazardFromAI() {
  if (!lastAIResult) return;
  var dangers  = lastAIResult.dangers  || [];
  var measures = lastAIResult.measures || [];

  // Fill up to 3 hazard slots
  form.hazards.forEach(function(h, i) {
    if (i < dangers.length) {
      h.point = dangers[i] || h.point;
    }
    if (i < measures.length) {
      h.countermeasure = measures[i] || h.countermeasure;
    }
  });

  // Also set work content if empty
  if (!form.workContent && lastAIResult.keyword) {
    form.workContent = lastAIResult.keyword + 'に関わる作業';
  }

  // Save draft and switch to hazard step
  saveDraft(form);
  step = 2; // Jump to hazard step
  switchTab('form');

  // Show feedback toast
  showToast('✅ KYフォームに' + Math.min(dangers.length, 3) + '件の危険ポイントを反映しました');
}

// ─── AI SUGGEST BUTTON IN STEP 2 ─────────────────────────────────
function openAISuggest() {
  var workContent = form.workContent || '';
  if (workContent) {
    aiState.keyword = workContent.substring(0, 20);
  }
  aiState.result = null;
  aiState.error = null;
  aiState.loading = false;
  switchTab('ai');
  setTimeout(function() {
    var input = document.getElementById('aiInput');
    if (input) { input.focus(); }
  }, 200);
}

// ─── TOAST NOTIFICATION ───────────────────────────────────────────
function showToast(msg) {
  var existing = document.getElementById('kyToast');
  if (existing) existing.remove();
  var toast = document.createElement('div');
  toast.id = 'kyToast';
  toast.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);' +
    'background:#1e293b;color:#fff;padding:10px 20px;border-radius:24px;' +
    'font-size:13px;font-weight:700;z-index:9999;white-space:nowrap;' +
    'box-shadow:0 4px 20px rgba(0,0,0,.3);animation:fadeSlide .3s ease;' +
    'font-family:Noto Sans JP,sans-serif;max-width:340px;text-align:center;';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(function() { if (toast.parentNode) toast.remove(); }, 3000);
}


// ─── SERVICE WORKER ───────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(reg => console.log('SW registered:', reg.scope))
    .catch(err => console.log('SW registration failed:', err));
}

// ─── INIT ─────────────────────────────────────────────────────────
(function init() {
  const draft = loadDraft();
  if (draft) {
    // Merge draft carefully
    form = { ...freshForm(), ...draft };
    form.hazards = (draft.hazards || []).map(h => ({ ...{point:'',severity:null,possibility:null,countermeasure:'',reeval:null}, ...h }));
    form.checks = { ...freshForm().checks, ...(draft.checks || {}) };
    form.participants = draft.participants || freshForm().participants;
  }
  render();
})();
</script>
