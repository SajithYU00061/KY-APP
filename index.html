<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KY活動表">
<meta name="theme-color" content="#0f3460">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>KY活動表 — ログイン</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --navy: #0f3460;
  --blue: #1a56db;
  --accent: #f59e0b;
  --danger: #ef4444;
  --safe: #10b981;
  --bg: #0a1628;
  --card: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.12);
  --text: #ffffff;
  --muted: rgba(255,255,255,0.5);
}

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 20px;
  position: relative;
  overflow: hidden;
}

/* Animated background */
body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(ellipse at 30% 20%, rgba(26,86,219,0.15) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 80%, rgba(245,158,11,0.08) 0%, transparent 60%);
  animation: bgPulse 8s ease-in-out infinite alternate;
  pointer-events: none;
}
@keyframes bgPulse {
  from { transform: scale(1) rotate(0deg); }
  to   { transform: scale(1.05) rotate(2deg); }
}

.wrap {
  width: 100%;
  max-width: 380px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  position: relative;
  z-index: 1;
}

/* Logo */
.logo-area {
  text-align: center;
  margin-bottom: 36px;
  animation: fadeDown 0.6s ease;
}
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.logo-icon {
  font-size: 56px;
  display: block;
  margin-bottom: 12px;
  filter: drop-shadow(0 4px 16px rgba(245,158,11,0.3));
}
.logo-title {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 26px;
  font-weight: 900;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.logo-sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
  font-weight: 400;
}

/* Card */
.card {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 28px 24px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  animation: fadeUp 0.5s ease 0.1s both;
  box-shadow: 0 24px 48px rgba(0,0,0,0.3);
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-title {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--muted);
  text-align: center;
  margin-bottom: 20px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* Site selector */
.site-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 8px;
}
.site-select {
  width: 100%;
  padding: 13px 16px;
  background: rgba(255,255,255,0.08);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  color: white;
  font-size: 14px;
  font-family: 'Noto Sans JP', sans-serif;
  outline: none;
  margin-bottom: 18px;
  -webkit-appearance: none;
  cursor: pointer;
}
.site-select:focus { border-color: rgba(26,86,219,0.8); }
.site-select option { background: #1e3a5f; color: white; }

/* PIN display */
.pin-display {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 24px;
}
.pin-dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
  background: transparent;
  transition: all 0.15s cubic-bezier(0.34,1.56,0.64,1);
}
.pin-dot.filled {
  background: var(--accent);
  border-color: var(--accent);
  transform: scale(1.2);
  box-shadow: 0 0 12px rgba(245,158,11,0.5);
}
.pin-dot.error {
  background: var(--danger);
  border-color: var(--danger);
  animation: shake 0.3s ease;
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%      { transform: translateX(-6px); }
  75%      { transform: translateX(6px); }
}

/* Keypad */
.keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.key {
  aspect-ratio: 1;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
  font-size: 22px;
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.12s;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-user-select: none;
  user-select: none;
  border: 1px solid rgba(255,255,255,0.08);
}
.key:active, .key.pressed {
  background: rgba(26,86,219,0.5);
  transform: scale(0.92);
  border-color: rgba(26,86,219,0.6);
}
.key.key-del {
  background: rgba(239,68,68,0.12);
  border-color: rgba(239,68,68,0.2);
  font-size: 18px;
}
.key.key-del:active { background: rgba(239,68,68,0.3); }
.key.key-empty { background: transparent; border-color: transparent; cursor: default; }

/* Error message */
.err-msg {
  text-align: center;
  color: #fca5a5;
  font-size: 12px;
  font-weight: 600;
  margin-top: 14px;
  min-height: 18px;
  transition: opacity 0.2s;
}

/* Install banner */
.install-banner {
  width: 100%;
  background: rgba(245,158,11,0.12);
  border: 1px solid rgba(245,158,11,0.3);
  border-radius: 14px;
  padding: 14px 16px;
  margin-top: 16px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
  animation: fadeUp 0.5s ease 0.3s both;
}
.install-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
.install-text { font-size: 12px; color: rgba(255,255,255,0.8); line-height: 1.6; }
.install-text strong { color: var(--accent); }
.install-btn {
  display: block;
  width: 100%;
  margin-top: 8px;
  padding: 10px;
  background: var(--accent);
  color: #0a1628;
  border: none;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 800;
  font-family: 'M PLUS Rounded 1c', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
}
.install-btn:active { transform: scale(0.97); }

/* Version tag */
.version {
  margin-top: 20px;
  font-size: 10px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 1px;
  animation: fadeUp 0.5s ease 0.4s both;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-area">
    <span class="logo-icon">⛑️</span>
    <div class="logo-title">KY活動表</div>
    <div class="logo-sub">危険予知活動 — 朝礼安全確認システム</div>
  </div>

  <div class="card">
    <div class="card-title">🔐 現場 PIN ログイン</div>

    <div class="site-label">現場を選択</div>
    <select class="site-select" id="siteSelect">
      <option value="">-- 現場を選んでください --</option>
    </select>

    <div class="pin-display" id="pinDisplay">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>

    <div class="keypad" id="keypad">
      <button class="key" onclick="pressKey('1')">1</button>
      <button class="key" onclick="pressKey('2')">2</button>
      <button class="key" onclick="pressKey('3')">3</button>
      <button class="key" onclick="pressKey('4')">4</button>
      <button class="key" onclick="pressKey('5')">5</button>
      <button class="key" onclick="pressKey('6')">6</button>
      <button class="key" onclick="pressKey('7')">7</button>
      <button class="key" onclick="pressKey('8')">8</button>
      <button class="key" onclick="pressKey('9')">9</button>
      <button class="key key-empty" disabled></button>
      <button class="key" onclick="pressKey('0')">0</button>
      <button class="key key-del" onclick="pressDelete()">⌫</button>
    </div>

    <div class="err-msg" id="errMsg"></div>
  </div>

  <!-- iOS/Android install prompt -->
  <div class="install-banner" id="installBanner" style="display:none">
    <div class="install-icon">📲</div>
    <div class="install-text">
      <strong>ホーム画面に追加してください</strong><br>
      <span id="installInstructions"></span>
    </div>
  </div>

  <div class="version">KY SYSTEM v1.0</div>
</div>

<script>
// ─── SITE CONFIG ─────────────────────────────────────────────────
// Edit this list to add/remove sites and change PINs
// PIN is a 4-digit string. Change these before deploying!
const SITES = [
  { id: 'site1', name: '林道南アルプス線（嘉助工区）', pin: '1234' },
  { id: 'site2', name: '現場B — ○○工事',              pin: '5678' },
  { id: 'site3', name: '現場C — △△工事',              pin: '9012' },
];
// ─────────────────────────────────────────────────────────────────

const PIN_LENGTH = 4;
let currentPin = '';
let attempts   = 0;
const MAX_ATTEMPTS = 5;

// ── Populate site select ──────────────────────────────────────────
const sel = document.getElementById('siteSelect');
SITES.forEach(s => {
  const opt = document.createElement('option');
  opt.value = s.id;
  opt.textContent = s.name;
  sel.appendChild(opt);
});

// Restore last site
const lastSite = sessionStorage.getItem('kySite');
if (lastSite) sel.value = lastSite;

// ── PIN logic ─────────────────────────────────────────────────────
function pressKey(k) {
  if (currentPin.length >= PIN_LENGTH) return;
  currentPin += k;
  updateDisplay();
  if (currentPin.length === PIN_LENGTH) {
    setTimeout(checkPin, 120);
  }
}

function pressDelete() {
  currentPin = currentPin.slice(0, -1);
  updateDisplay();
  clearError();
}

function updateDisplay() {
  for (let i = 0; i < PIN_LENGTH; i++) {
    const dot = document.getElementById(`d${i}`);
    dot.className = 'pin-dot' + (i < currentPin.length ? ' filled' : '');
  }
}

function checkPin() {
  const siteId = sel.value;
  if (!siteId) {
    showError('⚠️ 現場を先に選択してください');
    resetPin();
    return;
  }

  const site = SITES.find(s => s.id === siteId);
  if (!site) { showError('現場が見つかりません'); resetPin(); return; }

  if (currentPin === site.pin) {
    // ✅ Success
    attempts = 0;
    for (let i = 0; i < PIN_LENGTH; i++) {
      document.getElementById(`d${i}`).className = 'pin-dot filled';
    }
    // Store auth in sessionStorage (clears when browser closes)
    sessionStorage.setItem('kyAuth', JSON.stringify({
      siteId: site.id,
      siteName: site.name,
      ts: Date.now()
    }));
    sessionStorage.setItem('kySite', siteId);
    setTimeout(() => { window.location.href = 'app.html'; }, 300);

  } else {
    // ❌ Wrong PIN
    attempts++;
    for (let i = 0; i < PIN_LENGTH; i++) {
      document.getElementById(`d${i}`).className = 'pin-dot error';
    }
    const remaining = MAX_ATTEMPTS - attempts;
    if (remaining <= 0) {
      showError('⛔ 試行回数超過 — 30秒後に再試行できます');
      lockKeypad(30);
    } else {
      showError(`❌ PINが違います（あと${remaining}回）`);
    }
    setTimeout(resetPin, 600);
  }
}

function resetPin() {
  currentPin = '';
  updateDisplay();
}

function showError(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = msg;
}

function clearError() {
  document.getElementById('errMsg').textContent = '';
}

function lockKeypad(seconds) {
  const keys = document.querySelectorAll('.key');
  keys.forEach(k => { k.disabled = true; k.style.opacity = '0.3'; });
  let left = seconds;
  const interval = setInterval(() => {
    left--;
    showError(`⛔ ロック中 — ${left}秒後に再試行できます`);
    if (left <= 0) {
      clearInterval(interval);
      attempts = 0;
      keys.forEach(k => { k.disabled = false; k.style.opacity = '1'; });
      clearError();
    }
  }, 1000);
}

// ── Check existing auth (skip login if already authenticated) ─────
const existingAuth = sessionStorage.getItem('kyAuth');
if (existingAuth) {
  try {
    const auth = JSON.parse(existingAuth);
    // Session valid for 12 hours
    if (Date.now() - auth.ts < 12 * 60 * 60 * 1000) {
      window.location.href = 'app.html';
    }
  } catch(e) {}
}

// ── Register Service Worker ────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(reg => console.log('SW registered:', reg.scope))
    .catch(err => console.log('SW error:', err));
}

// ── PWA Install prompt ────────────────────────────────────────────
let deferredPrompt = null;
const banner = document.getElementById('installBanner');
const instructions = document.getElementById('installInstructions');

// Detect iOS
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const isAndroid = /Android/.test(navigator.userAgent);
const isStandalone = window.matchMedia('(display-mode: standalone)').matches
                  || window.navigator.standalone === true;

if (!isStandalone) {
  if (isIOS) {
    banner.style.display = 'flex';
    instructions.innerHTML = 'Safariで開き、下の <strong>共有ボタン（□↑）</strong> をタップ → <strong>「ホーム画面に追加」</strong> を選択してください。';
  } else if (isAndroid) {
    // Wait for beforeinstallprompt
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      banner.style.display = 'flex';
      instructions.innerHTML = 'このアプリをホーム画面に追加すると、<strong>オフラインでも</strong>使えます。';
      // Add install button
      const btn = document.createElement('button');
      btn.className = 'install-btn';
      btn.textContent = '📲 ホーム画面に追加する';
      btn.onclick = () => {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => {
          deferredPrompt = null;
          banner.style.display = 'none';
        });
      };
      banner.appendChild(btn);
    });
  }
}

// ── Keyboard support for desktop ─────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key >= '0' && e.key <= '9') pressKey(e.key);
  if (e.key === 'Backspace') pressDelete();
  if (e.key === 'Enter' && currentPin.length === PIN_LENGTH) checkPin();
});
</script>
</body>
</html>
